name: Auto Create Documentation PR (Gemini 2.5 Flash)

on:
  pull_request:
    types: [closed]
    branches: [main, master]

jobs:
  create-docs-pr:
    # Chỉ chạy khi Pull Request thực sự được merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Lấy 2 commit gần nhất để có thể so sánh git diff

      - name: Generate Documentation with Gemini 2.5 Flash
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO_NAME: ${{ github.repository }}
        run: |
          echo "🔍 Đang trích xuất thay đổi thực tế từ mã nguồn (Git Diff)..."
          
          # 1. Trích xuất Code Diff, loại bỏ các file không cần thiết để tiết kiệm token
          git diff HEAD^1 HEAD -- . \
            ':(exclude)*.lock' \
            ':(exclude)package-lock.json' \
            ':(exclude)pnpm-lock.yaml' \
            ':(exclude)yarn.lock' \
            ':(exclude)docs/*' \
            ':(exclude)*.png' \
            ':(exclude)*.jpg' \
            ':(exclude)*.jpeg' \
            ':(exclude)*.svg' \
            ':(exclude)*.gif' > changes.diff

          # Giới hạn nội dung diff gửi đi để tránh quá tải API (khoảng 100k ký tự)
          DIFF_CONTENT=$(cat changes.diff | head -c 100000)

          echo "📝 Đang chuẩn bị yêu cầu gửi cho Gemini..."

          # 2. Xây dựng Prompt (Sử dụng biến môi trường trực tiếp để an toàn hơn printf)
          # AI sẽ đọc nội dung template bạn điền trong PR_BODY và đối chiếu với DIFF_CONTENT
          PROMPT="Bạn là một chuyên gia Technical Writer cấp cao. 
          Nhiệm vụ: Phân tích nội dung Code Diff thực tế bên dưới kết hợp với mô tả của Developer để viết tài liệu tính năng (Markdown) bằng tiếng Anh.
          
          ### THÔNG TIN PULL REQUEST
          - Tiêu đề: $PR_TITLE
          - Số hiệu: #$PR_NUMBER
          - Nội dung từ Template PR:
          $PR_BODY

          ### CODE DIFF THAY ĐỔI (DỰA VÀO ĐÂY ĐỂ VIẾT CHI TIẾT KỸ THUẬT)
          $DIFF_CONTENT

          ### YÊU CẦU CẤU TRÚC TÀI LIỆU
          - Dòng đầu file: Auto-generated from PR #$PR_NUMBER - $PR_TITLE
          - Link ngược về PR: https://github.com/$REPO_NAME/pull/$PR_NUMBER
          - Nội dung bao gồm các phần:
            ## 🎯 Purpose (Mục đích)
            ## ✨ What Changed (Những thay đổi chính)
            ## ⚙️ Technical Details (Chi tiết kỹ thuật - Phân tích sâu từ code diff)
            ## 🚀 Deployment/Migration Notes (Lưu ý triển khai)
            ## ⚠️ Risks (Rủi ro nếu có)

          Yêu cầu: Viết chuyên nghiệp, súc tích. Trả về Markdown thuần, không bọc trong block code lớn."

          # 3. Tạo JSON payload an toàn bằng jq
          jq -n --arg msg "$PROMPT" '{contents: [{parts: [{text: $msg}]}]}' > payload.json

          # 4. Gọi API Gemini 2.5 Flash với cơ chế Retry
          MODEL_NAME="gemini-2.5-flash"
          SUCCESS=false
          for i in {1..5}; do
            echo "📡 Đang gọi API lần $i..."
            response=$(curl -s -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              -d @payload.json)

            # Trích xuất văn bản thực tế từ JSON response
            CONTENT=$(echo "$response" | jq -r '.candidates[0].content.parts[0].text // empty')
            
            if [ -n "$CONTENT" ] && [ "$CONTENT" != "null" ]; then
              echo "$CONTENT" > docs_content.md
              SUCCESS=true
              echo "✅ Đã nhận được nội dung tài liệu thành công!"
              break
            fi
            
            echo "⚠️ API đang bận hoặc lỗi. Chờ 15s rồi thử lại..."
            sleep 15
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ API Error: $response"
            exit 1
          fi

          # 5. Xử lý tên file (Chuyển "Tính năng mới" -> "tinh-nang-moi")
          CLEAN_TITLE=$(echo "${PR_TITLE}" | sed 's/[^a-zA-Z0-9 ]//g' | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-50)
          FILE_PATH="docs/features/${PR_NUMBER}-${CLEAN_TITLE}.md"
          
          mkdir -p docs/features/
          mv docs_content.md "$FILE_PATH"
          
          # 6. Dọn dẹp file tạm
          rm payload.json changes.diff
          
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT

      - name: Create Pull Request for Documentation
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: cập nhật tài liệu tự động cho PR #${{ github.event.pull_request.number }}"
          branch: "docs/update-pr-${{ github.event.pull_request.number }}"
          delete-branch: true
          title: "📝 [Tài liệu] PR #${{ github.event.pull_request.number }} - Phân tích từ Code Diff"
          body: |
            Tài liệu này được tạo tự động bởi **Gemini 2.5 Flash** cho PR #${{ github.event.pull_request.number }}.
            
            **Phân tích:**
            - Kết hợp thông tin từ PR Template và Code Diff thực tế.
            - Tự động tạo file trong `docs/features/`.
          labels: "documentation, ai-generated"
          base: main